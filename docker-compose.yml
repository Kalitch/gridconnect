version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: gridconnect-db
    environment:
      POSTGRES_USER: gridconnect
      POSTGRES_PASSWORD: gridconnect_password
      POSTGRES_DB: gridconnect_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gridconnect"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: gridconnect-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://gridconnect:gridconnect_password@postgres:5432/gridconnect_db
      DATABASE_HOST: postgres
      DATABASE_USER: gridconnect
      DATABASE_NAME: gridconnect_db
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
    entrypoint: /app/docker-entrypoint.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gridconnect-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      REACT_APP_API_URL: http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules

volumes:
  postgres_data: